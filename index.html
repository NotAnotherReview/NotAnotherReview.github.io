<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sci-Fi Cinema Features - Exploring the Future of Film</title>
    <style>
        :root {
            --dark-bg: #07101d;
            --accent-blue: #00f2fe;
            --text-main: #e2e8f0;
            --card-bg: rgba(11, 29, 58, 0.5);
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        header {
            text-align: center;
            padding: 80px 20px;
            background: linear-gradient(rgba(7, 16, 29, 0.7), var(--dark-bg));
        }

        h1 {
            font-size: 3.5rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 10px;
            background: linear-gradient(to right, var(--accent-blue), #ff9068);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .article-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }

        .article-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s ease, border-color 0.3s ease;
            text-decoration: none;
            color: inherit;
        }

        .article-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-blue);
        }

        .card-image {
            width: 100%;
            height: 200px;
            background-size: cover;
            background-position: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .card-content {
            padding: 20px;
        }

        .card-content h2 {
            margin: 0 0 10px 0;
            font-size: 1.5rem;
            color: var(--accent-blue);
        }

        .card-content p {
            margin: 0;
            color: #94a3b8;
            font-size: 0.95rem;
        }

        footer {
            text-align: center;
            padding: 60px 20px;
            color: #64748b;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>Cinema Universe</h1>
        <p>In-depth analysis of tomorrow's cinema, today.</p>
    </header>

    <main class="container">
        <div class="article-grid">
            <a href="articles/avatar-fire-and-ash/index.html" class="article-card">
                <div class="card-image" style="background-image: url('articles/avatar-fire-and-ash/AVATAR_FAA_KA_DIGITAL_1SHT_TSR_sRGB_V2.jpg');"></div>
                <div class="card-content">
                    <h2>Avatar: Fire and Ash</h2>
                    <p>Exploring the darker side of Pandora and the rise of the Ash People.</p>
                </div>
            </a>
            
            <!-- Future articles can be added here -->
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Cinema Universe. All rights reserved.</p>
    </footer>

</body>
</html>
